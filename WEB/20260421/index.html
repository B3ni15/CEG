<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Ételek tápanyagtáblázat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Étel</th>
                <th>Szénhidrát (g)</th>
                <th>Fehérje (g)</th>
                <th>Zsír (g)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Csirkemell</td>
                <td>0</td>
                <td>31</td>
                <td>3.6</td>
            </tr>
            <tr>
                <td>Rizs</td>
                <td>28</td>
                <td>2.7</td>
                <td>0.3</td>
            </tr>
            <tr>
                <td>Avokádó</td>
                <td>9</td>
                <td>2</td>
                <td>15</td>
            </tr>
        </tbody>
    </table>

    <h1 id="food-title">Ételek</h1>
    <div id="food-container">
        <div class="food-card">
            <h1>Csirkemell</h1>
            <p>Szénhidrát: 0 g</p>
            <p>Fehérje: 31 g</p>
            <p>Zsír: 3.6 g</p>
        </div>
        <div class="food-card">
            <h1>Rizs</h1>
            <p>Szénhidrát: 28 g</p>
            <p>Fehérje: 2.7 g</p>
            <p>Zsír: 0.3 g</p>
        </div>
        <div class="food-card">
            <h1>Avokádó</h1>
            <p>Szénhidrát: 9 g</p>
            <p>Fehérje: 2 g</p>
            <p>Zsír: 15 g</p>
        </div>
    </div>
</body>
</html>
